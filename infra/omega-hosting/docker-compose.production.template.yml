# Ω-HOSTING-T — production-grade template for Hostinger KVM 8
#
# This is a template only. It does not contain real runtime values.
# Keep private values on the VPS, never in Git.
# Intended topology:
#   Internet -> Caddy HTTPS -> n8n on private Docker network -> Postgres volume

services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile.template:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
      - /var/log/caddy:/var/log/caddy
    depends_on:
      - n8n
    networks:
      - public_edge
      - n8n_internal

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-n8n}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?runtime_value_required}
      POSTGRES_DB: ${POSTGRES_DB:-n8n}
    volumes:
      - n8n_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-n8n} -d ${POSTGRES_DB:-n8n}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - n8n_internal

  n8n:
    image: n8nio/n8n:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "5678"
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${POSTGRES_DB:-n8n}
      DB_POSTGRESDB_USER: ${POSTGRES_USER:-n8n}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD:?runtime_value_required}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY:?runtime_value_required}
      N8N_HOST: ${N8N_HOST:?runtime_value_required}
      N8N_PORT: 5678
      N8N_PROTOCOL: https
      WEBHOOK_URL: ${WEBHOOK_URL:?runtime_value_required}
      GENERIC_TIMEZONE: ${GENERIC_TIMEZONE:-America/Toronto}
      N8N_DIAGNOSTICS_ENABLED: ${N8N_DIAGNOSTICS_ENABLED:-false}
      N8N_PERSONALIZATION_ENABLED: ${N8N_PERSONALIZATION_ENABLED:-false}
      EXECUTIONS_DATA_PRUNE: ${EXECUTIONS_DATA_PRUNE:-true}
      EXECUTIONS_DATA_MAX_AGE: ${EXECUTIONS_DATA_MAX_AGE:-336}
      N8N_SECURE_COOKIE: ${N8N_SECURE_COOKIE:-true}
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - n8n_internal

volumes:
  caddy_data:
  caddy_config:
  n8n_data:
  n8n_postgres_data:

networks:
  public_edge:
    driver: bridge
  n8n_internal:
    driver: bridge
    internal: true
