m_plus:
  - id: pr_210_cognitive_os_canon
    statement: Cognitive OS canon integrated through docs, structured data, and dependency-free tests.
  - id: pr_209_oakbench_scoring
    statement: OAKBench scoring becomes useful when paired with tests and explicit gates.
  - id: pr_25_effective_projection_validation
    statement: Rich canon can coexist with bounded effective validation views.
m_minus:
  - id: draft_blocks_merge
    statement: Draft pull requests are observation targets, not automatic merge candidates.
  - id: mergeable_false_blocks_merge
    statement: Non-mergeable pull requests are blockers, not merge candidates.
  - id: sensitive_scope_blocks_automatic_integration
    statement: Sensitive scope requires explicit gates and verification before integration.
  - id: metaphor_not_proof
    statement: Brain and organism language remains metaphor unless formalized and validated.
