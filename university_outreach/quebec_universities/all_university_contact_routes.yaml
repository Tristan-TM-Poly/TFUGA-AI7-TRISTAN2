# All Quebec University Contact Routes
# Canonical register for official routes. Do not infer an email from a naming convention.

route_register:
  scoring:
    GREEN_EMAIL:
      meaning: official institutional email verified on an official page or official directory
      send_allowed: true
    GREEN_FORM:
      meaning: official contact form or portal verified
      send_allowed: false
      required_action: submit_form_packet_with_confirmation_record
    YELLOW_RESEARCH:
      meaning: official route exists but contact needs deeper search
      send_allowed: false
    RED_REJECTED:
      meaning: guessed, unofficial, stale, or irrelevant route
      send_allowed: false
  wave1:
    INRS:
      status: GREEN_EMAIL_SENT
      route: info.emt@inrs.ca
