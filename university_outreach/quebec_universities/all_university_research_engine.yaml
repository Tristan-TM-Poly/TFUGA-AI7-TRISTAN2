# All Quebec University Research Outreach Engine
# Internal automation scaffold. Do not send externally without verified contact route and OAK approval.

engine:
  name: AIT-Tristan2 Quebec University Research Engine
  status: active_scaffold
  objective: >
    Automate discovery, scoring, message adaptation, routing, response tracking, and follow-up
    for every Quebec university and their relevant research/innovation directions.
  source_basis:
    - "Quebec university network includes 18 universities."
    - "The Universite du Quebec network includes 10 institutions."
    - "BCI coordinates voluntary cooperation among Quebec universities."
  core_offer: "micro-benchmark OAK-safe, 2-4 weeks, no unsupported claims"
  contact_scoring:
    GREEN_EMAIL:
      send_allowed: true
      condition: "official institutional email from current university page or official directory"
    GREEN_FORM:
      send_allowed: false
      condition: "official university form or contact portal; requires form submission record"
    YELLOW:
      send_allowed: false
      condition: "official route exists but specific email/form still needs deeper search"
    RED:
      send_allowed: false
      condition: "guessed, third-party, stale, or non-institutional contact"
  workflow:
    - discover_official_research_pages
    - extract_research_axes_and_contacts
    - score_route_GREEN_EMAIL_GREEN_FORM_YELLOW_RED
    - adapt_microbenchmark_message
    - send_GREEN_EMAIL_only_after_command_or_approval
    - prepare_GREEN_FORM_packets
    - record_sent_or_submission_confirmation
    - monitor_replies
    - send_one_follow_up_after_7_to_10_days_if_no_reply
    - route_interested_replies_to_meeting_decision_cards
    - record_mplus_mminus

