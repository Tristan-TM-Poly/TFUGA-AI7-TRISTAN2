$schema: "https://json-schema.org/draft/2020-12/schema"
title: HGFMEdge
type: object
additionalProperties: false
required:
  - id
  - type
  - inputs
  - outputs
  - transform
  - oak_status
properties:
  id:
    type: string
  type:
    type: string
    enum:
      - transform
      - proof_step
      - refutation
      - experiment
      - code_change
      - issue_to_pr
      - log_cvcd_oak
      - mycelial_bridge
      - memory_update
      - agent_action
      - canonization
  inputs:
    type: array
    items: { type: string }
    minItems: 1
  outputs:
    type: array
    items: { type: string }
    minItems: 1
  transform:
    type: string
    description: Operator or process applied by the hyperedge.
  layer:
    type: array
    items: { type: string }
  scale:
    type: array
    items:
      type: string
      enum: [micro, meso, macro, meta, meta2, omega]
  constraints:
    type: array
    items: { type: string }
  evidence:
    type: array
    items: { type: string }
  residue:
    type: array
    items: { type: string }
  oak_status:
    type: string
    enum: [TRACE, COHERENT, FERTILE, TESTABLE, TESTED, REPRODUCED, MEASURED, PROVEN, CANON, M_MINUS]
  omegagate:
    type: string
    enum: [NEG, P0, ACTIVE, UNKNOWN, CERTIFIED]
    default: UNKNOWN
  weight:
    type: object
    additionalProperties:
      type: number
    properties:
      truth: { type: number }
      fertility: { type: number }
      validation: { type: number }
      utility: { type: number }
      value: { type: number }
      risk: { type: number }
      cost: { type: number }
      residue: { type: number }
      mycelial_bridge: { type: number }
