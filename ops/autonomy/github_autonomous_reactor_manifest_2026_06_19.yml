reactor_loop:
  - repo_inventory
  - static_safety_audit
  - package_and_workflow_detection
  - oak_cvcd_classification
  - m_minus_update
  - build_or_compile_matrix
  - improvement_queue_generation
  - additive_branch_packet
  - draft_pull_request
  - checks_and_review
  - canon_promotion_if_gated

safe_permissions:
  github_actions_default:
    contents: read
  elevated_write_only_when_needed:
    contents: write
    pull_requests: write
  rules:
    - prefer_artifacts_over_commits_for_scheduled_runs
    - prefer_draft_pr_over_direct_main_push
    - never_force_push
    - never_merge_without_explicit_review
    - never_print_secrets
    - never_claim_physical_validation_without_measurements
    - never_claim_official_submission_without_external_confirmation

classification_labels:
  CANON: validated_or_reproducibly_supported
  FERTILE: promising_but_not_certified
  OAK_TEST: needs_falsification_or_benchmark
  REPAIR: valuable_but_has_residue
  M_MINUS: failed_or_refuted_pattern_to_remember
  ARCHIVE: low_current_value_or_duplicate

required_repo_contract:
  files_or_equivalents:
    - docs/REPO_CANON_ROLE.md
    - docs/claims.md
    - reports/autopilot/README.md
    - .github/workflows/repo-audit.yml
  commands:
    - python -m compileall .
    - pytest
    - python tools/autopilot/oak_cvcd_report.py --repo-root . --mode full

m_minus_policy:
  storage_target: memory/m_minus/github_m_minus_registry.jsonl
  required_fields:
    - timestamp
    - repository
    - finding_type
    - severity
    - evidence
    - repair_rule
    - future_penalty_pattern

bayes_tristan_priority_function:
  score: information_gain + cvcd_gain + prototype_value - cost - risk - m_minus_penalty
  promote_when:
    - oak_level_sufficient
    - residue_low
    - tests_pass
    - no_unresolved_high_risk_claims
  keep_fertile_when:
    - proof_low
    - fertility_high
    - testability_high
    - risk_controlled
