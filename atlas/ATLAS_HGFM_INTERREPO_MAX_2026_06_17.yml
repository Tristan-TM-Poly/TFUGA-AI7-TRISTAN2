hyperedge_classes:
  contains: "repo -> artifact"
  defines: "artifact -> theory"
  implements: "artifact -> prototype"
  validates: "test -> claim"
  falsifies: "test -> claim"
  logs: "residue -> failure"
  promotes: "oak_report -> artifact -> status"
  projects: "theory -> domain"
  extracts: "signal_pipeline -> relation"
  packages: "publication_kernel -> manuscript -> target"
  indexes: "atlas -> artifact"
  bridges: "repo_a -> repo_b -> invariant"

major_hyperedges:
  H1_canonization:
    path: ["intuition_archive", "DCT_Omega_packet", "code_or_proof", "test_simulation_benchmark", "OAK", "M_MINUS", "minimal_canon"]
    repos: ["Tristan_Tardif-Morency_TFUG", "TFUGA-AI7-TRISTAN2", "TTM-TFUGA-AI7-TRISTAN2", "Tristan_Tardif-Morency_TFUGAG", "TFACC", "PEFA-FractalEnergySystem"]
