version: "2026-06-17"
status: "X_to_D_canonization_packet"
purpose: "Machine-readable inter-repository HGFM atlas for the Tristan-TM-Poly GitHub ecosystem."
master_invariant: >-
  Tout fichier devient noeud. Tout noeud devient DCT. Tout DCT devient testable.
  Tout test devient OAK. Tout echec devient M_MINUS. Tout invariant stable devient canon.
  Tout canon devient atlas. Tous les atlas se relient en HGFM.

language_levels:
  L0_machine_files:
    description: "Raw files and bytes."
    examples: ["py", "json", "yml", "toml", "ipynb", "tex", "md", "jsonl", "github_workflows"]
  L1_agent_semantics:
    description: "Schemas, manifests, registries, checksums, OAK reports, residues."
  L2_developer_code:
    description: "APIs, CLIs, tests, CI, scripts, modules, examples."
  L3_research:
    description: "Definitions, hypotheses, proofs, simulations, benchmarks, validation protocols."
  L4_human:
    description: "Readable maps, guided tours, summaries, roadmaps."
  L5_public_pedagogy:
    description: "Public gateway, web surfaces, educational quest, launch notes, product sheets."
  L6_canon_oak:
    description: "Status labels, claims, OAK gates, M_MINUS, audit, promotion decisions."
  L7_interrepo_hgfm:
    description: "Coupled mycelial hypergraph across repositories and artifacts."

status_labels:
  S: speculative
  E: exploratory
  X: crystallizable
  D: locally_demonstrated
  C: canonical
  A: archived

