[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "omega-action-ext-t"
version = "0.1.0"
description = "OAK-safe external action automation kernel for Tristan's Omega ecosystem."
readme = "README.md"
requires-python = ">=3.10"
authors = [{ name = "Tristan-TM-Poly" }]
license = { text = "Proprietary / research prototype until IP classification" }
keywords = ["automation", "actions", "oak", "risk", "permission", "dry-run"]

[project.scripts]
omega-action = "omega_action_ext_t.cli:main"

[tool.setuptools.packages.find]
where = ["."]
include = ["omega_action_ext_t*"]

[tool.pytest.ini_options]
pythonpath = ["."]
testpaths = ["tests"]
