  title: "string"
  domain: "corporate | ip | product | sales | finance | admin | research"
  action_type: "FULL_AUTO | APPROVE_ONE_TAP | DELEGATE | REVIEW_GATE | WAITING_FOR_PROOF | M_MINUS_HOLD"
  owner: "AIT-Tristan2"
