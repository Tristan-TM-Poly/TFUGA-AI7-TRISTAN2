  next_action:
    - "string"
  proof_required:
    - "completion_note"
    - "confirmation_email"
    - "receipt_or_pdf"
  risk_flags:
    - "string"
  oak_status: "prepared_not_completed"
  timestamps:
    created_at: "TODO"
    updated_at: "TODO"
  completion:
    confirmed: false
    proof_links: []
    notes: "TODO"
