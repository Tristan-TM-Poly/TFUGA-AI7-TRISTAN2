    tests:
      - "Test numérique via représentation complexe 2n x 2n."
    next_action: "Durcir tests/test_quaternion_laplacian.py et formaliser les hypothèses."

  - id: CVCD_LOGEXP
    name: "CVCD / LOG-EXP"
    constellation: mathematiques
    status: CONCEPT
    definition: "Extraction de composantes compressées fertiles et redéploiement en tests, prototypes, agents."
