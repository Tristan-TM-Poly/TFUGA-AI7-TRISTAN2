    failed_claim: "Résidu zéro / filtrage parfait sans benchmark."
    cause: "Confusion entre hypothèse mathématique fertile et mesure réelle."
    guardrail: "Tout claim de performance doit avoir dataset, baseline, métriques et reproduction."
    next_test: "Benchmark synthétique + données réelles."

  - id: AUTO_CERTIFICATION_CANON
    failed_claim: "Une théorie devient canon parce qu'elle est cohérente dans le texte."
    cause: "Auto-certification."
    guardrail: "Canon requires definition + evidence + attack + residue + reuse."
    next_test: "OAKReport obligatoire."
