# Tristan Canon Registry — seed v0.1
# Purpose: one compact registry for concepts, claims, tests, risks and next actions.
# Rule: fertile != proven, simulated != measured, active != certified.

registry:
  version: "0.1"
  date: "2026-06-18"
  oak_rule: "No canon without definition, evidence, attack, residue and reuse."

statuses:
  - NARRATIVE
  - CONCEPT
  - FORMALIZED
  - SIMULATION_READY
  - SIMULATED
  - MEASUREMENT_READY
  - MEASURED
  - REPLICATED
  - CERTIFIED
  - M_MINUS

constellations:
  racines:
    description: "OS R5, TM, TTM, pré-axiomes, maintien."
  theorie:
    description: "TFUGA, TGTM, TFU, axiomes, théorèmes récursifs."
  mathematiques:
    description: "FFWT, LOG/EXP, catégories, tenseurs, hyperalgèbres, Laplaciens."
  structure:
    description: "HGFM, THT, META-YGGDRASIL, projecteurs, hypergraphes."
  verification:
    description: "OAK, DCT, Counterexample-OAK, M_MINUS, statuts."
  intelligence:
    description: "AI-7, SAGE, AIT-PANTHEON, AIT-Traductor, agents."
  matiere:
    description: "Spectroscopie, cristaux, LC/RLC, capteurs, matériaux, énergie."
  civilisation:
    description: "Alexandrie, CICP, GAIA-R5, publication, transmission."

modules:
