    next_action: "Créer protocole SPICE basse tension."

  - id: AIT_TRADUCTOR
    name: "AIT-Traductor"
    constellation: intelligence
    status: CONCEPT
    definition: "Traducteur humain-machine-mémoire-preuve : idée -> structure -> code -> test -> rapport."
    evidence:
