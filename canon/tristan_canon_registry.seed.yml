    name: "TM / TTM"
    constellation: racines
    status: FORMALIZED
    definition: "Racine pré-axiomatique : transformation, maintien, trace, tresse, mémoire."
    evidence:
      - "Corpus répète TM/TTM comme base avant TFUGA."
    risks:
      - "Rester trop abstrait sans exemples opératoires."
    tests:
      - "Transformer 10 idées du corpus en fiches Cell_Omega avec trace et statut."
    next_action: "Créer docs/theory/tm_ttm_roots.md."

  - id: OAK_DCT_M_MINUS
    name: "OAK / DCT / M_MINUS"
    constellation: verification
    status: FORMALIZED
    definition: "Système immunitaire épistémique : attaque, statuts, falsification, mémoire négative."
    evidence:
      - "Règles ACTIVE != CERTIFIED, UNKNOWN != FALSE, SIMULATED != MEASURED stabilisées."
    risks:
      - "Statuts non appliqués uniformément aux claims."
    tests:
      - "Chaque nouveau claim doit produire un OAKReport."
    next_action: "Ajouter schema oak_report et script analyze_all."

  - id: THT_HGFM
    name: "Théorie des Hypergraphes de Tristan"
    constellation: structure
    status: FORMALIZED
    definition: "Hypergraphe orienté, typé, fractal, multi-couche, multi-échelle, dynamique, avec mémoire positive/négative et validation."
    evidence:
      - "Codex THT/HGFM et moteur Python seed dans PR #21."
    risks:
      - "Confondre langage générateur et théorie prouvée."
    tests:
      - "Construire incidence, Omega score, OAK gate et M_MINUS sur un corpus réel."
    next_action: "Relier docs/theory/tht_hgfm_codex.md au registry."

