$schema: "https://json-schema.org/draft/2020-12/schema"
title: "AUTO2 Workflow"
type: object
required:
  - workflow
properties:
  workflow:
    type: object
    required:
      - id
      - name
      - purpose
      - trigger
      - inputs
      - steps
      - outputs
      - permissions
      - oak
      - status
    properties:
      id:
        type: string
      name:
        type: string
      version:
        type: string
        default: "0.1.0"
      owner:
        type: string
        default: "Tristan"
      purpose:
        type: string
      trigger:
        type: object
        properties:
          type:
            type: string
            enum: [manual, daily, weekly, event, condition, github, drive, email, calendar]
          schedule:
            type: string
      inputs:
        type: array
        items:
          type: string
      steps:
        type: array
        minItems: 1
        items:
          type: string
      outputs:
        type: array
        minItems: 1
        items:
          type: string
      permissions:
        type: object
        properties:
          read:
            type: array
            items: { type: string }
          write:
            type: array
            items: { type: string }
          forbidden:
            type: array
            items: { type: string }
      oak:
        type: object
        required: [required, checks]
        properties:
          required:
            type: boolean
          checks:
            type: array
            items: { type: string }
      rollback:
        type: object
        properties:
          possible:
            type: boolean
          method:
            type: string
      telemetry:
        type: object
        properties:
          track:
            type: array
            items: { type: string }
      status:
        type: string
        enum: [draft, dry_run_allowed, controlled, trusted_limited, blocked, deprecated]
