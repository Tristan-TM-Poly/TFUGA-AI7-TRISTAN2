name: QC SciPatent Digest Source v04

on:
  pull_request:
    paths:
      - 'projects/qc_scipatent_digest/**'
      - '.github/workflows/qc_scipatent_digest_source_v04.yml'
  push:
    branches:
      - omega-scipatent-qc-digest-source-v04
    paths:
      - 'projects/qc_scipatent_digest/**'
      - '.github/workflows/qc_scipatent_digest_source_v04.yml'

jobs:
  test-source-v04:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: projects/qc_scipatent_digest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest
      - name: Test
        run: python -m pytest -q
      - name: Run offline PLUS ULTRA demo
        run: python -m qc_scipatent_digest.cli plus-ultra --out outputs/ci_plus_ultra
