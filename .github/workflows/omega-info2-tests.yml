name: Ω-INFO²-T Tests

on:
  push:
    paths:
      - "omega_info2_tristan/**"
      - ".github/workflows/omega-info2-tests.yml"
  pull_request:
    paths:
      - "omega_info2_tristan/**"
      - ".github/workflows/omega-info2-tests.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: omega_info2_tristan
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: python -m pip install -e . pytest

      - name: Run tests
        run: python -m pytest -q
