name: Omega Zeta Mandel Tests

on:
  pull_request:
    paths:
      - 'docs/OMEGA_ZETA_MANDEL_T.md'
      - 'prototypes/omega_zeta_mandel_t/**'
      - '.github/workflows/omega-zeta-mandel-t.yml'
  workflow_dispatch:

jobs:
  omega-zeta-mandel:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run OAK-safe prototype tests
        run: |
          python -m pip install --upgrade pip pytest
          python -m pytest -q prototypes/omega_zeta_mandel_t/test_omega_zeta_mandel.py

      - name: Verify OAK guardrail text
        run: |
          python - <<'PY'
          from pathlib import Path
          doc = Path('docs/OMEGA_ZETA_MANDEL_T.md').read_text(encoding='utf-8')
          required = [
              'not proofs',
              'Riemann',
              'OAK',
          ]
          missing = [term for term in required if term not in doc]
          if missing:
              raise SystemExit(f'Missing OAK guardrail terms: {missing}')
          PY
