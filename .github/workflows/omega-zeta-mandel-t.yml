name: Omega Zeta Mandel Tests

on:
  pull_request:
    paths:
      - 'docs/OMEGA_ZETA_MANDEL_T.md'
      - 'prototypes/omega_zeta_mandel_t/**'
      - '.github/workflows/omega-zeta-mandel-t.yml'
  workflow_dispatch:

jobs:
  omega-zeta-mandel:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run OAK-safe prototype tests
        run: |
          python -m pip install --upgrade pip pytest
          python -m pytest -q prototypes/omega_zeta_mandel_t/test_omega_zeta_mandel.py

      - name: Verify bilingual OAK guardrail text
        run: |
          python - <<'PY'
          from pathlib import Path
          doc = Path('docs/OMEGA_ZETA_MANDEL_T.md').read_text(encoding='utf-8').lower()
          required_groups = [
              ('riemann',),
              ('oak',),
              ('preuve', 'proof'),
              ('ne constitue pas une preuve', 'not a proof', 'not proofs'),
          ]
          missing = [group for group in required_groups if not any(term in doc for term in group)]
          if missing:
              raise SystemExit(f'Missing OAK guardrail term group(s): {missing}')
          PY
