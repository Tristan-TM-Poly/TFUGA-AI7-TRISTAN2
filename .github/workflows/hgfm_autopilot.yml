name: TFUGA HGFM Autopilot

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

permissions:
  contents: read

jobs:
  validate:
    name: Validate HGFM Autopilot
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r tfuga_hgfm_autopilot/requirements.txt

      - name: Run tests
        run: |
          python -m pytest -q tfuga_hgfm_autopilot/tests

      - name: Dry-run watcher
        run: |
          python tfuga_hgfm_autopilot/scripts/hgfm_watch.py . --once --dry-run
