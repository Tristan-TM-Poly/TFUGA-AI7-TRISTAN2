name: omega-game-t-ci

on:
  pull_request:
    paths:
      - 'omega_game_t/**'
      - '.github/workflows/omega_game_t_ci.yml'
  push:
    branches:
      - main
    paths:
      - 'omega_game_t/**'
      - '.github/workflows/omega_game_t_ci.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: omega_game_t
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install pytest
        run: python -m pip install --upgrade pip pytest

      - name: Run tests
        run: PYTHONPATH=. python -m pytest tests -q
