name: Rosette-Tristan CI
on:
  push:
    paths:
      - "projects/rosette-tristan/**"
      - ".github/workflows/rosette-tristan-ci.yml"
  pull_request:
    paths:
      - "projects/rosette-tristan/**"
      - ".github/workflows/rosette-tristan-ci.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: projects/rosette-tristan
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e ".[dev]"
      - run: pytest -q
