name: Rosette-Tristan CI
on:
  push:
    paths:
      - "projects/rosette-tristan/**"
      - ".github/workflows/rosette-tristan-ci.yml"
  pull_request:
    paths:
      - "projects/rosette-tristan/**"
      - ".github/workflows/rosette-tristan-ci.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: projects/rosette-tristan
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e ".[dev]"
      - name: Unit tests
        run: pytest -q
      - name: Rosette doctor
        run: rosette-doctor --out out_doctor/doctor_report.json --require-all-commands
      - name: Rosette CLI smoke benchmarks
        run: |
          rosette-bench --out out_bench
          rosette-bench-corpus init --out out_corpus
          rosette-corpus-bench out_corpus/corpus_manifest.json --out out_corpus_bench
      - name: Upload Rosette reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rosette-ci-reports
          path: |
            projects/rosette-tristan/out_doctor/doctor_report.json
            projects/rosette-tristan/out_bench/rosette_bench_report.json
            projects/rosette-tristan/out_corpus/corpus_manifest.json
            projects/rosette-tristan/out_corpus_bench/corpus_bench_report.json
          if-no-files-found: warn
