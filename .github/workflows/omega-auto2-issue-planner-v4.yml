name: Omega AUTO2 V4 Issue Planner

on:
  workflow_dispatch:
    inputs:
      execute:
        description: Create issues instead of dry-run
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      limit:
        description: Maximum number of P0 issues to plan or create
        required: true
        default: "4"
      control_issue:
        description: Optional parent control issue number
        required: false
        default: ""

permissions:
  contents: read
  issues: write

jobs:
  plan-p0-issues:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate AUTO2 reactor artifacts
        run: |
          python scripts/omega_github_auto2_factory.py \
            --config configs/omega_github_auto2_top1024.json \
            --out artifacts/omega_github_auto2 \
            --issue-limit 16 \
            --mode materialize

      - name: Dry-run issue planner
        if: ${{ github.event.inputs.execute == 'false' }}
        run: |
          python scripts/omega_auto2_issue_planner_v4.py \
            --manifest artifacts/omega_github_auto2/top1024_manifest.json \
            --limit "${{ github.event.inputs.limit }}" \
            --audit-out artifacts/omega_auto2_issue_planner_v4/audit.json

      - name: Execute issue planner
        if: ${{ github.event.inputs.execute == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          CONTROL="${{ github.event.inputs.control_issue }}"
          if [ -z "$CONTROL" ]; then
            python scripts/omega_auto2_issue_planner_v4.py \
              --manifest artifacts/omega_github_auto2/top1024_manifest.json \
              --limit "${{ github.event.inputs.limit }}" \
              --execute \
              --audit-out artifacts/omega_auto2_issue_planner_v4/audit.json
          else
            python scripts/omega_auto2_issue_planner_v4.py \
              --manifest artifacts/omega_github_auto2/top1024_manifest.json \
              --limit "${{ github.event.inputs.limit }}" \
              --control-issue "$CONTROL" \
              --execute \
              --audit-out artifacts/omega_auto2_issue_planner_v4/audit.json
          fi

      - name: Print audit
        run: cat artifacts/omega_auto2_issue_planner_v4/audit.json
