name: Tristan Publication Atlas

on:
  workflow_dispatch:
    inputs:
      scope:
        description: "quebec or canada"
        required: false
        default: "quebec"
      offline:
        description: "true for offline template, false for public metadata APIs"
        required: false
        default: "true"
      max_institutions:
        description: "Max institutions"
        required: false
        default: "20"
      max_authors:
        description: "Max public authors per project/institution"
        required: false
        default: "3"
      max_works:
        description: "Max works per public author/project"
        required: false
        default: "5"
      top_k:
        description: "Max dossiers to write"
        required: false
        default: "50"
  push:
    paths:
      - "scripts/omega_tristan_publication_atlas.py"
      - "configs/tristan_publication_atlas.json"
      - "tests/test_omega_tristan_publication_atlas.py"
      - "docs/publications/**"
      - ".github/workflows/tristan-publication-atlas.yml"

jobs:
  publication-atlas:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Compile atlas
        run: python -m py_compile scripts/omega_tristan_publication_atlas.py
      - name: Run unit tests
        run: python -m unittest tests/test_omega_tristan_publication_atlas.py
      - name: Build publication atlas
        run: |
          OFFLINE_FLAG=""
          if [ "${{ github.event.inputs.offline || 'true' }}" = "true" ]; then OFFLINE_FLAG="--offline"; fi
          python scripts/omega_tristan_publication_atlas.py \
            --config configs/tristan_publication_atlas.json \
            --scope "${{ github.event.inputs.scope || 'quebec' }}" \
            --max-institutions "${{ github.event.inputs.max_institutions || '20' }}" \
            --max-authors "${{ github.event.inputs.max_authors || '3' }}" \
            --max-works "${{ github.event.inputs.max_works || '5' }}" \
            --top-k "${{ github.event.inputs.top_k || '50' }}" \
            --out-dir artifacts/publication_atlas \
            $OFFLINE_FLAG
      - name: Upload publication atlas artifact
        uses: actions/upload-artifact@v4
        with:
          name: tristan-publication-atlas
          path: artifacts/publication_atlas
