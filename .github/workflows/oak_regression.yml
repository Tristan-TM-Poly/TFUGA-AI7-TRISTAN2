name: OAK Regression

on:
  push:
  pull_request:

jobs:
  hgfm-core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run tests
        run: python -m pytest tests/test_hgfm_core.py
