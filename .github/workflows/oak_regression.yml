name: OAK Regression

on:
  push:
  pull_request:

jobs:
  hgfm-core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install pytest
        run: python -m pip install pytest
      - name: Run OAK regression tests
        run: python -m pytest tests/test_hgfm_core.py tests/test_quaternion_laplacian.py tests/test_prime_tensor.py tests/test_omega_16n.py
      - name: Run Prime Tensor proof sprint smoke test
        run: python experiments/prime_tensor/prime_tensor.py --count 16 --max-gap-step 2
      - name: Run Omega 16n symbolic expansion smoke test
        run: python experiments/omega_16n/omega_16n.py --depth 4 --top-k 8 --sample-limit 256
