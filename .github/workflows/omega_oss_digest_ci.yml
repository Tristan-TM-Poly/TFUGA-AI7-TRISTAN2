name: Omega OSS Digest CI

on:
  pull_request:
    paths:
      - "omega_oss_digest_t/**"
      - "tests/test_omega_oss_digest*.py"
      - "docs/OMEGA_OSS_DIGEST*.md"
      - "examples/omega_oss_digest_seed_sources.json"
      - "pyproject.toml"
      - ".github/workflows/omega_oss_digest_ci.yml"
  push:
    branches:
      - omega-oss-digest-max
    paths:
      - "omega_oss_digest_t/**"
      - "tests/test_omega_oss_digest*.py"
      - "docs/OMEGA_OSS_DIGEST*.md"
      - "examples/omega_oss_digest_seed_sources.json"
      - "pyproject.toml"
      - ".github/workflows/omega_oss_digest_ci.yml"

permissions:
  contents: read

jobs:
  test:
    name: pytest / Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install test dependency
        run: python -m pip install --upgrade pip pytest

      - name: Run Ω-OSS-DIGEST tests
        run: python -m pytest tests/test_omega_oss_digest_t.py tests/test_omega_oss_digest_api_layer.py

      - name: CLI smoke test
        run: |
          python -m omega_oss_digest_t.cli compile-github "heat equation" "finite difference" --language Python --license-id mit --min-stars 50 --pushed-after 2024-01-01
          python -m omega_oss_digest_t.cli compile-stack "numpy broadcasting error" --tag python --tag numpy
