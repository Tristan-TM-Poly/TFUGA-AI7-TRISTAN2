name: ffwt-hac-ci

on:
  pull_request:
    paths:
      - 'prototypes/omega_ffwt_hac_cvcd/**'
      - 'tests/test_ffwt_hac_benchmark.py'
      - 'docs/omega-ffwt-hac-cvcd/**'
      - '.github/workflows/ffwt_hac_ci.yml'
  push:
    branches:
      - main
    paths:
      - 'prototypes/omega_ffwt_hac_cvcd/**'
      - 'tests/test_ffwt_hac_benchmark.py'
      - 'docs/omega-ffwt-hac-cvcd/**'
      - '.github/workflows/ffwt_hac_ci.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install pytest
        run: python -m pip install --upgrade pip pytest

      - name: Import benchmark module
        run: python - <<'PY'
          import sys
          sys.path.insert(0, 'prototypes/omega_ffwt_hac_cvcd')
          import run_ffwt_hac_benchmark as bench
          print(bench.__name__)
          PY

      - name: Check feature extraction
        run: python - <<'PY'
          import sys
          sys.path.insert(0, 'prototypes/omega_ffwt_hac_cvcd')
          import run_ffwt_hac_benchmark as bench
          sample = bench.make_synthetic_dataset(n_per_class=2, noise=0.0)[0]
          for name in ['FFT', 'DWT', 'FFWT_HAC', 'FFWT_PLUS_FFT']:
              vector = bench.features(sample.signal, name)
              assert vector and all(isinstance(value, float) for value in vector)
          PY

      - name: Check report builder
        run: python - <<'PY'
          import sys
          sys.path.insert(0, 'prototypes/omega_ffwt_hac_cvcd')
          import run_ffwt_hac_benchmark as bench
          report = bench.build_report([0.0], include_fixture=True)
          payload = bench.asdict(report)
          assert 'synthetic' in payload['datasets']
          assert 'csv_adapter_fixture' in payload['datasets']
          assert payload['classification_results']
          assert payload['compression_results']
          assert payload['winners_by_dataset_noise']
          assert payload['ablation_summary']
          PY

      - name: Check CSV adapter
        run: python - <<'PY'
          import sys
          import tempfile
          from pathlib import Path
          sys.path.insert(0, 'prototypes/omega_ffwt_hac_cvcd')
          import run_ffwt_hac_benchmark as bench
          with tempfile.TemporaryDirectory() as tmpdir:
              path = Path(tmpdir) / 'signals.csv'
              path.write_text('label,values\na,1 2 3 4\nb,4 3 2 1\n', encoding='utf-8')
              rows = bench.load_csv_dataset(path)
              assert len(rows) == 2
              assert rows[0].source == 'csv'
          PY

      - name: Run pytest suite
        run: python -m pytest tests/test_ffwt_hac_benchmark.py -q

      - name: Generate benchmark reports
        run: |
          python prototypes/omega_ffwt_hac_cvcd/run_ffwt_hac_benchmark.py --noise-levels 0.0,0.05,0.10 --output reports/omega-ffwt-hac-cvcd/benchmark.json --markdown-output reports/omega-ffwt-hac-cvcd/benchmark.md
