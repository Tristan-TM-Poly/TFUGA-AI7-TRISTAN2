name: ffwt-hac-ci

on:
  pull_request:
    paths:
      - 'prototypes/omega_ffwt_hac_cvcd/**'
      - 'tests/test_ffwt_hac_benchmark.py'
      - 'docs/omega-ffwt-hac-cvcd/**'
      - '.github/workflows/ffwt_hac_ci.yml'
  push:
    branches:
      - main
    paths:
      - 'prototypes/omega_ffwt_hac_cvcd/**'
      - 'tests/test_ffwt_hac_benchmark.py'
      - 'docs/omega-ffwt-hac-cvcd/**'
      - '.github/workflows/ffwt_hac_ci.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install pytest
        run: python -m pip install --upgrade pip pytest

      - name: Run tests
        run: python -m pytest tests/test_ffwt_hac_benchmark.py -q

      - name: Compile benchmark script
        run: python -m py_compile prototypes/omega_ffwt_hac_cvcd/run_ffwt_hac_benchmark.py

      - name: Generate synthetic benchmark reports
        run: python prototypes/omega_ffwt_hac_cvcd/run_ffwt_hac_benchmark.py --noise-levels 0.0 --no-fixture --output reports/omega-ffwt-hac-cvcd/synthetic.json --markdown-output reports/omega-ffwt-hac-cvcd/synthetic.md

      - name: Generate fixture benchmark reports
        run: python prototypes/omega_ffwt_hac_cvcd/run_ffwt_hac_benchmark.py --noise-levels 0.0 --output reports/omega-ffwt-hac-cvcd/benchmark.json --markdown-output reports/omega-ffwt-hac-cvcd/benchmark.md
