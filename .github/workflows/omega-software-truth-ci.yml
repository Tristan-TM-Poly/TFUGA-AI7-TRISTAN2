name: Ω-CS-SOFTWARE-TRUTH CI

on:
  push:
    paths:
      - "omega_software_truth/**"
      - "tests/test_omega_software_truth.py"
      - "examples/omega_software_truth_demo.py"
      - ".github/workflows/omega-software-truth-ci.yml"
  pull_request:
    paths:
      - "omega_software_truth/**"
      - "tests/test_omega_software_truth.py"
      - "examples/omega_software_truth_demo.py"
      - ".github/workflows/omega-software-truth-ci.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependency
        run: python -m pip install pytest

      - name: Run Ω-CS tests
        run: python -m pytest -q tests/test_omega_software_truth.py

      - name: Run Ω-CS demo
        run: python examples/omega_software_truth_demo.py
