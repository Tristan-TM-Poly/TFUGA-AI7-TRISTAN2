name: Ω-VTP-T TensorProd

on:
  pull_request:
    paths:
      - "omega_vtp_t/**"
      - "tests/test_tensor_prod_lift.py"
      - "tests/test_sparse_adaptive_tensorprod.py"
      - "examples/tensorprod_demo.py"
      - ".github/workflows/omega-vtp-tensorprod.yml"
  push:
    branches:
      - main
    paths:
      - "omega_vtp_t/**"
      - "tests/test_tensor_prod_lift.py"
      - "tests/test_sparse_adaptive_tensorprod.py"
      - "examples/tensorprod_demo.py"
      - ".github/workflows/omega-vtp-tensorprod.yml"

jobs:
  oakbench:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: python -m pip install --upgrade pip numpy
      - name: Run unit tests
        run: python -m unittest discover -s tests
      - name: Run TensorProd demo
        run: python examples/tensorprod_demo.py
      - name: Run CLI exactness check
        run: python -m omega_vtp_t.cli exactness
