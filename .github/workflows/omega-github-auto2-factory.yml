name: Omega GitHub AUTO2 Factory

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Generate Top1024 artifacts
        run: python scripts/omega_github_auto2_factory.py --config configs/omega_github_auto2_top1024.json --out artifacts/omega_github_auto2 --issue-limit 16
      - name: Run AUTO2 tests
        run: python -m unittest tests/test_omega_github_auto2_factory.py
      - name: Print execution queue
        run: cat artifacts/omega_github_auto2/top64_execution_queue.md
