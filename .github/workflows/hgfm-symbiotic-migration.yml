name: HGFM Symbiotic Migration Validation

on:
  workflow_dispatch:
    inputs:
      run_label:
        description: "Human-readable migration label"
        required: false
        default: "manual-hgfm-symbiotic-migration"
  pull_request:
    branches: ["main", "master"]
    paths:
      - "tools/hgfm_symbiotic_migration_v0_1/**"
      - ".github/workflows/hgfm-symbiotic-migration.yml"

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy pandas

      - name: Run self-test
        run: python tools/hgfm_symbiotic_migration_v0_1/hgfm_symbiotic_migration.py --self-test

      - name: Run demo migration
        run: python tools/hgfm_symbiotic_migration_v0_1/hgfm_symbiotic_migration.py --demo --out reports/hgfm_symbiotic_demo

      - name: Upload migration reports
        uses: actions/upload-artifact@v4
        with:
          name: hgfm-symbiotic-migration-reports
          path: reports/hgfm_symbiotic_demo
