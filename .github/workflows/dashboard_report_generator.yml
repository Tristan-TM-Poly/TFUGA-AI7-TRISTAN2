name: Dashboard Report Generator

on:
  pull_request:
    paths:
      - "tools/action_dashboard/**"
      - "examples/action_dashboard/**"
      - "tests/test_dashboard_report_generator.py"
      - ".github/workflows/dashboard_report_generator.yml"
  push:
    branches: [main]
    paths:
      - "tools/action_dashboard/**"
      - "examples/action_dashboard/**"
      - "tests/test_dashboard_report_generator.py"
      - ".github/workflows/dashboard_report_generator.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-dashboard-report-generator:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependency
        run: python -m pip install --upgrade pytest

      - name: Run dashboard generator tests
        run: python -m pytest -q tests/test_dashboard_report_generator.py

      - name: Smoke test CLI report generation
        run: |
          python tools/action_dashboard/dashboard_report_generator.py \
            examples/action_dashboard/sample_cycle_snapshot.json \
            --markdown-out /tmp/ACTION_DASHBOARD_REPORT.md \
            --json-out /tmp/ACTION_DASHBOARD_REPORT.json
          test -s /tmp/ACTION_DASHBOARD_REPORT.md
          test -s /tmp/ACTION_DASHBOARD_REPORT.json
