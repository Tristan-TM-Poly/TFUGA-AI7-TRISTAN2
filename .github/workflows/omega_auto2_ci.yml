name: omega-auto2-ci

on:
  pull_request:
    paths:
      - 'omega_auto2_kernel/**'
      - '.github/workflows/omega_auto2_ci.yml'
  push:
    branches:
      - main
    paths:
      - 'omega_auto2_kernel/**'
      - '.github/workflows/omega_auto2_ci.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: omega_auto2_kernel
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install
        run: python -m pip install -e .[dev]

      - name: Test
        run: pytest -q
