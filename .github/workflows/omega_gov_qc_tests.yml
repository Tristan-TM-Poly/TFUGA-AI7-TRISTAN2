name: omega-gov-qc-tests

on:
  pull_request:
    paths:
      - "omega_gov_qc_t/**"
      - ".github/workflows/omega_gov_qc_tests.yml"
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package and test tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e omega_gov_qc_t pytest

      - name: Run tests
        run: |
          pytest omega_gov_qc_t
