name: PR220 Focused Tests

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "tools/**"
      - "tests/**"
      - "schemas/**"
      - "configs/**"
      - "docs/oak_reports/**"
      - "docs/architecture/**"

permissions:
  contents: read

jobs:
  focused-tests:
    name: Focused pytest groups
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pytest
        run: python -m pip install --upgrade pip pytest

      - name: Static compile smoke
        run: |
          python -m compileall -q tools tests

      - name: Core safety tests
        run: |
          pytest \
            tests/test_red_flag_detector.py \
            tests/test_pharma_privacy_scrubber.py \
            tests/test_ait_action_autonomy_gate.py \
            tests/test_risk_debt_ledger.py \
            tests/test_immune_compiler.py

      - name: Reality and forge tests
        run: |
          pytest \
            tests/test_worldmodel_perturbation_lab.py \
            tests/test_hallucination_labeler.py \
            tests/test_return_to_baseline.py \
            tests/test_reality_gradient.py \
            tests/test_proof_ladder.py \
            tests/test_counterworld_generator.py \
            tests/test_failure_oracle.py \
            tests/test_artifact_compiler.py

      - name: Canon OS tests
        run: |
          pytest \
            tests/test_canon_rank.py \
            tests/test_proof_capital.py \
            tests/test_canon_graph.py \
            tests/test_canon_mutation_engine.py \
            tests/test_self_audit_loop.py \
            tests/test_contradiction_engine.py \
            tests/test_residue_miner.py \
            tests/test_canon_thermostat.py \
            tests/test_canon_compiler.py \
            tests/test_deprecation_engine.py \
            tests/test_canon_immune_response.py

      - name: Factory and continuation tests
        run: |
          pytest \
            tests/test_experiment_engine.py \
            tests/test_benchmark_ladder.py \
            tests/test_revenue_gate.py \
            tests/test_ip_publication_gate.py \
            tests/test_factory_scheduler.py \
            tests/test_proof_to_asset_compiler.py \
            tests/test_continuation_mode_router.py \
            tests/test_autonomy_downgrade_loop.py \
            tests/test_safe_next_action_kernel.py \
            tests/test_fallback_ladder.py \
            tests/test_task_graph.py \
            tests/test_missing_input_synthesizer.py \
            tests/test_dead_end_converter.py \
            tests/test_autonomous_priority_engine.py \
            tests/test_oak_motion_states.py \
            tests/test_self_propelling_loop.py

      - name: Propulsion and stabilization tests
        run: |
          pytest \
            tests/test_propulsion_score.py \
            tests/test_task_queue_mesh.py \
            tests/test_self_repair_loop.py \
            tests/test_artifact_selector.py \
            tests/test_oak_governor.py \
            tests/test_autonomous_sprint_cell.py \
            tests/test_progress_memory.py \
            tests/test_useful_work_catalog.py \
            tests/test_entropy_mapper.py \
            tests/test_organ_splitter.py \
            tests/test_import_smoke_tester.py \
            tests/test_dependency_graph_builder.py \
            tests/test_stability_assessor.py \
            tests/test_scope_rules.py \
            tests/test_readiness_status.py \
            tests/test_connector_alias_registry.py \
            tests/test_micro_pr_generator.py \
            tests/test_pr220_import_smoke.py
